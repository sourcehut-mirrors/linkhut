submitter:
  git.sr.ht:
    enabled: true
    allow-refs:
      - "refs/tags/v*"
  hub.sr.ht:
    enabled: false
image: alpine/edge
packages:
  - docker
secrets:
  -  dafdc7fa-451e-44cb-aa67-339ae7ca2e87 # docker registry credentials
environment:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: matiaslb/linkhut
sources:
  - https://git.sr.ht/~mlb/linkhut
tasks:
  - setup: |
      sudo rc-service docker start
      sudo addgroup $USER docker
  - login: |
      # Load Docker registry secrets
      set +x -a
      source ~/docker-hub.env
      # Login to Docker registry using secrets
      echo $DOCKER_PASSWORD | docker login ${DOCKER_REGISTRY} -u $DOCKER_USERNAME --password-stdin
      set -x +a
  - build: |
      cd linkhut
      export DOCKER_BUILDKIT=1
      # Register QEMU for arm64 emulation
      docker run --privileged --rm tonistiigi/binfmt --install all
      # Extract version from mix.exs (e.g., "0.2.0")
      VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
      # Build and push each platform separately (avoids docker-in-docker issues)
      for arch in amd64 arm64; do
        docker build --platform linux/${arch} -f contrib/docker/Dockerfile \
          -t ${DOCKER_IMAGE}:${VERSION}-${arch} .
        docker push ${DOCKER_IMAGE}:${VERSION}-${arch}
      done
      # Create and push multi-arch manifests
      for tag in ${VERSION} latest; do
        docker manifest create ${DOCKER_IMAGE}:${tag} \
          ${DOCKER_IMAGE}:${VERSION}-amd64 \
          ${DOCKER_IMAGE}:${VERSION}-arm64
        docker manifest push ${DOCKER_IMAGE}:${tag}
      done
