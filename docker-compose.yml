services:
  postgres:
    image: postgres:15-alpine
    network_mode: bridge
    environment:
      PGDATA: /linkhut
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - "postgres-data:/linkhut"
    ports:
      - "5432:5432"
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    environment:
      MINIO_ROOT_USER: miniouser
      MINIO_ROOT_PASSWORD: miniopassword
    volumes:
      - "minio-data:/data"
    command: ["server", "/data", "--console-address", ":9001"]
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 miniouser miniopassword;
      mc ready myminio;
      mc mb --ignore-existing myminio/linkhut-dev;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
